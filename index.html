<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouBike 2.0 智慧搜尋 - 介面修正版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; }
        
        #main-map { height: 100%; width: 100%; }
        .tab-active { color: #2563eb; border-bottom: 2px solid #2563eb; }
        
        .user-marker {
            background-color: #3b82f6;
            border: 3px solid white;
            border-radius: 50%;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.6);
            animation: pulse 2s infinite;
        }
        .pin-marker {
            background-color: #f59e0b;
            border: 3px solid white;
            border-radius: 50%;
            box-shadow: 0 0 15px rgba(245, 158, 11, 0.6);
        }

        @keyframes pulse {
            0 { transform: scale(1); box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7); }
            70% { transform: scale(1.1); box-shadow: 0 0 0 10px rgba(59, 130, 246, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); }
        }

        .crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1000;
            pointer-events: none;
            opacity: 0.3;
        }

        .btn-out-of-view {
            background-color: #2563eb !important;
            color: white !important;
            box-shadow: 0 4px 20px rgba(37, 99, 235, 0.4);
        }

        .out-of-bounds-pattern {
            fill: url(#diagonalHatch);
            fill-opacity: 0.5;
            pointer-events: none;
        }

        /* 修正：將隱藏位置設得更遠，確保完全消失 */
        #notification-toast, #timer-modal {
            top: -250px;
            transition: top 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #notification-toast.show, #timer-modal.show {
            top: 20px;
        }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <!-- 頂部手機通知 -->
    <div id="notification-toast" class="fixed left-1/2 -translate-x-1/2 z-[3000] w-[90%] max-w-sm bg-slate-900 text-white px-6 py-4 rounded-2xl shadow-2xl flex items-center gap-3">
        <div class="bg-amber-500 p-1.5 rounded-full">
            <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
        </div>
        <div class="flex flex-col">
            <span class="text-sm font-bold">非資料供給範圍</span>
            <span class="text-xs text-slate-400">目前僅提供「台北市」站點資料</span>
        </div>
    </div>

    <!-- 秒數設定彈窗 -->
    <div id="timer-modal" class="fixed left-1/2 -translate-x-1/2 z-[3001] w-[90%] max-w-sm bg-white p-5 rounded-2xl shadow-2xl border border-slate-200">
        <h3 class="font-bold text-slate-800 mb-2">設定自動更新</h3>
        <p class="text-xs text-slate-500 mb-4">輸入秒數以自動重新抓取資料 (最低 30 秒)</p>
        <div class="flex gap-2">
            <input type="number" id="input-seconds" placeholder="秒數" class="flex-grow border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" min="30">
            <button id="btn-save-timer" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-bold">儲存</button>
            <button onclick="toggleTimerModal(false)" class="bg-slate-100 text-slate-600 px-4 py-2 rounded-lg text-sm">取消</button>
        </div>
    </div>

    <header class="bg-white border-b border-slate-200 px-4 pt-4 shadow-sm z-50">
        <div class="max-w-5xl mx-auto">
            <div class="flex justify-between items-center mb-2">
                <div class="flex flex-col">
                    <h1 class="text-xl font-bold text-slate-800">YouBike 2.0 智慧搜尋</h1>
                    <div id="status-bar" class="flex gap-2 mt-1 items-center">
                        <span id="loc-type" class="text-[10px] px-2 py-0.5 rounded-full font-bold bg-slate-100 text-slate-500">初始化中...</span>
                        <span id="lock-status" class="hidden text-[10px] px-2 py-0.5 rounded-full font-bold bg-amber-100 text-amber-700">位置已鎖定</span>
                        <span id="auto-refresh-tag" class="hidden text-[10px] px-2 py-0.5 rounded-full font-bold bg-emerald-100 text-emerald-700 flex items-center gap-1">
                            自動更新中 (<span id="countdown-text">--</span>s)
                        </span>
                    </div>
                </div>
                <div id="loader" class="hidden flex items-center gap-2 text-blue-600 text-xs font-medium">
                    <div class="animate-spin h-3 w-3 border-2 border-blue-600 border-t-transparent rounded-full"></div>
                    更新中
                </div>
            </div>
            
            <div class="flex gap-8 text-sm font-bold text-slate-400">
                <button id="tab-map" class="pb-3 tab-active">地圖模式</button>
                <button id="tab-list" class="pb-3">列表模式 (台北市)</button>
            </div>
        </div>
    </header>

    <main class="flex-grow relative overflow-hidden">
        
        <div id="view-map" class="h-full w-full relative">
            <div id="main-map"></div>
            
            <svg style="position: absolute; width: 0; height: 0;">
                <defs>
                    <pattern id="diagonalHatch" patternUnits="userSpaceOnUse" width="15" height="15">
                        <path d="M-1,1 l2,-2 M0,15 l15,-15 M14,16 l2,-2" style="stroke:#94a3b8; stroke-width:1.5" />
                    </pattern>
                </defs>
            </svg>

            <div class="crosshair">
                <svg width="30" height="30" viewBox="0 0 40 40" fill="none" stroke="#64748b" stroke-width="2">
                    <line x1="20" y1="10" x2="20" y2="30" /><line x1="10" y1="20" x2="30" y2="20" />
                </svg>
            </div>

            <!-- 控制按鈕群 -->
            <div class="absolute bottom-8 right-6 flex flex-col items-end gap-3 z-[1001]">
                <button id="btn-unlock" class="hidden bg-amber-500 text-white px-5 py-3 rounded-full shadow-lg font-bold text-sm hover:bg-amber-600 active:scale-95 transition-all">
                    改變我目前的位置
                </button>
                
                <button onclick="toggleTimerModal(true)" class="bg-white p-4 rounded-full shadow-lg text-slate-600 border border-slate-200 hover:bg-slate-50 active:scale-90 transition-all flex items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    <span class="font-bold text-sm">設定自動更新</span>
                </button>

                <button id="btn-refresh" class="bg-emerald-500 text-white px-6 py-4 rounded-full shadow-lg hover:bg-emerald-600 active:scale-90 transition-all flex items-center gap-2">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                    <span class="font-bold text-lg">更新資料</span>
                </button>

                <button id="btn-locate" class="bg-white px-6 py-4 rounded-full shadow-2xl text-blue-600 border border-slate-200 hover:bg-slate-50 active:scale-90 transition-all flex items-center gap-2">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    <span class="font-bold text-lg">定位</span>
                </button>
            </div>

            <div id="msg-overlay" class="hidden absolute inset-0 bg-slate-900/60 z-[2000] flex items-center justify-center p-6 text-center">
                <div class="bg-white p-6 rounded-2xl max-w-sm shadow-2xl">
                    <div class="text-amber-500 mb-4"><svg class="w-12 h-12 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg></div>
                    <h2 class="text-xl font-bold mb-2">無法取得 GPS 定位</h2>
                    <p class="text-slate-500 text-sm mb-6">我們無法存取您的位置。請在「台北市區域」的地圖上點擊一點作為您的搜尋起始位置。</p>
                    <button onclick="closeOverlay()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl shadow-lg">進入釘選模式</button>
                </div>
            </div>
        </div>

        <div id="view-list" class="hidden h-full w-full bg-slate-50 overflow-y-auto p-4">
            <div id="station-list" class="max-w-2xl mx-auto space-y-3 pb-24">
                <div class="text-center py-20 text-slate-400 font-medium">請先定位或在地圖上釘選位置</div>
            </div>
        </div>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const API_URL = 'https://tcgbusfs.blob.core.windows.net/dotapp/youbike/v2/youbike_immediate.json';
        const TAIPEI_BOUNDS = { minLat: 24.960, maxLat: 25.210, minLng: 121.457, maxLng: 121.666 };

        const tabMap = document.getElementById('tab-map');
        const tabList = document.getElementById('tab-list');
        const viewMap = document.getElementById('view-map');
        const viewList = document.getElementById('view-list');
        const stationList = document.getElementById('station-list');
        const loader = document.getElementById('loader');
        const locTypeTag = document.getElementById('loc-type');
        const lockTag = document.getElementById('lock-status');
        const msgOverlay = document.getElementById('msg-overlay');
        const btnUnlock = document.getElementById('btn-unlock');
        const btnLocate = document.getElementById('btn-locate');
        const btnRefresh = document.getElementById('btn-refresh');
        const toast = document.getElementById('notification-toast');
        const timerModal = document.getElementById('timer-modal');
        const inputSeconds = document.getElementById('input-seconds');
        const autoRefreshTag = document.getElementById('auto-refresh-tag');
        const countdownText = document.getElementById('countdown-text');

        let map, userMarker, stationMarkers = {}, boundsOverlay;
        let allStations = [];
        let myPosition = null; 
        let isGpsMode = false;
        let isLocked = false;
        
        let refreshInterval = null;
        let countdownValue = 0;
        let countdownInterval = null;

        function initMap() {
            map = L.map('main-map', { zoomControl: false }).setView([25.0478, 121.5170], 16);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

            const world = [[-90, -180], [-90, 180], [90, 180], [90, -180]];
            const taipei = [
                [TAIPEI_BOUNDS.minLat, TAIPEI_BOUNDS.minLng],
                [TAIPEI_BOUNDS.maxLat, TAIPEI_BOUNDS.minLng],
                [TAIPEI_BOUNDS.maxLat, TAIPEI_BOUNDS.maxLng],
                [TAIPEI_BOUNDS.minLat, TAIPEI_BOUNDS.maxLng]
            ];
            
            boundsOverlay = L.polygon([world, taipei], {
                className: 'out-of-bounds-pattern',
                color: 'transparent',
                fillOpacity: 1,
                interactive: false
            }).addTo(map);

            map.on('move', () => { checkPositionVisibility(); checkServiceAvailability(); });
            map.on('moveend', () => { 
                const center = map.getCenter();
                fetchAndRender(center.lat, center.lng);
                checkPositionVisibility(); 
                checkServiceAvailability(); 
            });
            map.on('click', (e) => { if (isGpsMode || isLocked) return; setManualPosition(e.latlng.lat, e.latlng.lng); });

            startDiscovery();
        }

        // --- 更新邏輯 ---
        btnRefresh.onclick = async () => {
            allStations = []; 
            const center = map.getCenter();
            await fetchAndRender(center.lat, center.lng);
        };

        function toggleTimerModal(show) {
            if (show) timerModal.classList.add('show');
            else timerModal.classList.remove('show');
        }

        document.getElementById('btn-save-timer').onclick = () => {
            const sec = parseInt(inputSeconds.value);
            if (isNaN(sec) || sec < 30) {
                // 不使用 alert，改為視覺回饋
                inputSeconds.style.borderColor = 'red';
                setTimeout(() => { inputSeconds.style.borderColor = ''; }, 2000);
                return;
            }
            startAutoRefresh(sec);
            toggleTimerModal(false);
        };

        function startAutoRefresh(sec) {
            if (refreshInterval) clearInterval(refreshInterval);
            if (countdownInterval) clearInterval(countdownInterval);

            autoRefreshTag.classList.remove('hidden');
            countdownValue = sec;
            countdownText.innerText = countdownValue;

            countdownInterval = setInterval(() => {
                countdownValue--;
                if (countdownValue <= 0) countdownValue = sec;
                countdownText.innerText = countdownValue;
            }, 1000);

            refreshInterval = setInterval(() => {
                btnRefresh.click();
            }, sec * 1000);
        }

        // --- 原有邏輯 ---
        function checkServiceAvailability() {
            const mapBounds = map.getBounds();
            const taipeiLatLngBounds = L.latLngBounds(
                [TAIPEI_BOUNDS.minLat, TAIPEI_BOUNDS.minLng],
                [TAIPEI_BOUNDS.maxLat, TAIPEI_BOUNDS.maxLng]
            );
            if (!mapBounds.intersects(taipeiLatLngBounds)) toast.classList.add('show');
            else toast.classList.remove('show');
        }

        function checkPositionVisibility() {
            if (!myPosition) return;
            const bounds = map.getBounds();
            if (bounds.contains([myPosition.lat, myPosition.lng])) btnLocate.classList.remove('btn-out-of-view');
            else btnLocate.classList.add('btn-out-of-view');
        }

        function startDiscovery() {
            if (!navigator.geolocation) { switchToManual(); return; }
            navigator.geolocation.getCurrentPosition(
                pos => {
                    isGpsMode = true;
                    myPosition = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                    updateUserMarker('user-marker');
                    locTypeTag.innerText = "GPS 定位模式";
                    locTypeTag.className = "text-[10px] px-2 py-0.5 rounded-full font-bold bg-blue-100 text-blue-700";
                    map.flyTo([myPosition.lat, myPosition.lng], 17);
                },
                err => { switchToManual(); }
            );
        }

        function switchToManual() {
            isGpsMode = false;
            locTypeTag.innerText = "手動釘選模式 (台北限定)";
            locTypeTag.className = "text-[10px] px-2 py-0.5 rounded-full font-bold bg-amber-100 text-amber-700";
            msgOverlay.classList.remove('hidden');
        }

        function closeOverlay() { msgOverlay.classList.add('hidden'); }

        function setManualPosition(lat, lng) {
            if (lat < TAIPEI_BOUNDS.minLat || lat > TAIPEI_BOUNDS.maxLat || lng < TAIPEI_BOUNDS.minLng || lng > TAIPEI_BOUNDS.maxLng) return;
            myPosition = { lat, lng };
            isLocked = true;
            updateUserMarker('pin-marker');
            btnUnlock.classList.remove('hidden');
            lockTag.classList.remove('hidden');
            map.flyTo([lat, lng], 17);
            fetchAndRender(lat, lng);
        }

        btnUnlock.onclick = () => {
            isLocked = false;
            btnUnlock.classList.add('hidden');
            lockTag.classList.add('hidden');
            if (userMarker) map.removeLayer(userMarker);
            userMarker = null;
            btnLocate.classList.remove('btn-out-of-view');
        };

        btnLocate.onclick = () => {
            if (myPosition) map.flyTo([myPosition.lat, myPosition.lng], 17);
            else startDiscovery();
        };

        function updateUserMarker(className) {
            if (userMarker) map.removeLayer(userMarker);
            const icon = L.divIcon({ className, iconSize: [18, 18], iconAnchor: [9, 9] });
            userMarker = L.marker([myPosition.lat, myPosition.lng], { icon, zIndexOffset: 1000 }).addTo(map);
            checkPositionVisibility();
        }

        function getDistance(lat1, lon1, lat2, lon2) {
            const p = 0.017453292519943295; const c = Math.cos;
            const a = 0.5 - c((lat2 - lat1) * p)/2 + c(lat1 * p) * c(lat2 * p) * (1 - c((lon2 - lon1) * p))/2;
            return 12742 * Math.asin(Math.sqrt(a)) * 1000;
        }

        async function fetchAndRender(lat, lng) {
            loader.classList.remove('hidden');
            Object.values(stationMarkers).forEach(m => map.removeLayer(m));
            stationMarkers = {};

            try {
                if (allStations.length === 0) {
                    const res = await fetch(API_URL);
                    allStations = await res.json();
                }

                const nearest = allStations
                    .filter(s => s.latitude >= TAIPEI_BOUNDS.minLat && s.latitude <= TAIPEI_BOUNDS.maxLat && s.longitude >= TAIPEI_BOUNDS.minLng && s.longitude <= TAIPEI_BOUNDS.maxLng)
                    .map(s => ({
                        ...s,
                        dist: getDistance(lat, lng, s.latitude, s.longitude)
                    })).sort((a, b) => a.dist - b.dist).slice(0, 20);

                renderList(nearest);
            } catch (e) { console.error(e); } finally { loader.classList.add('hidden'); }
        }

        function renderList(stations) {
            stationList.innerHTML = '';
            stations.forEach((s, i) => {
                const sName = s.sna.replace('YouBike2.0_', '');
                const rentAvailable = s.available_rent_bikes;
                const returnAvailable = s.available_return_bikes;
                const updateTimeText = s.updateTime || s.mday.split(' ')[1];
                const hasBikes = rentAvailable > 0;
                const mColor = hasBikes ? '#10b981' : '#ef4444';
                
                const sMarker = L.circleMarker([s.latitude, s.longitude], {
                    radius: 7, color: 'white', fillColor: mColor, fillOpacity: 1, weight: 2
                }).addTo(map).bindPopup(`<b>${sName}</b><br>可用車輛: ${rentAvailable}<br>可還數量: ${returnAvailable}`);
                
                stationMarkers[s.sno] = sMarker;

                const card = document.createElement('div');
                card.className = 'bg-white p-4 rounded-xl shadow-sm border border-slate-100 flex justify-between items-center hover:border-blue-300 transition-all cursor-pointer';
                card.innerHTML = `
                    <div class="flex-grow">
                        <h3 class="font-bold text-slate-800">${sName}</h3>
                        <div class="flex flex-wrap gap-x-3 gap-y-1 mt-1 text-[10px] text-slate-400 font-medium">
                            <span class="flex items-center gap-1"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>${Math.round(s.dist)} m</span>
                            <span class="flex items-center gap-1 text-slate-500 font-bold underline">可還數量: ${returnAvailable}</span>
                            <span class="flex items-center gap-1 font-normal opacity-70">更新: ${updateTimeText}</span>
                        </div>
                    </div>
                    <div class="text-right min-w-[70px]">
                        <p class="text-2xl font-black ${hasBikes ? 'text-emerald-600' : 'text-rose-500'}">${rentAvailable}</p>
                        <p class="text-[10px] text-slate-400 font-bold leading-none">可用車輛</p>
                    </div>
                `;
                card.onclick = () => {
                    tabMap.click();
                    map.flyTo([s.latitude, s.longitude], 17);
                    setTimeout(() => { if (stationMarkers[s.sno]) stationMarkers[s.sno].openPopup(); }, 450);
                };
                stationList.appendChild(card);
            });
        }

        tabMap.onclick = () => {
            viewMap.classList.remove('hidden'); viewList.classList.add('hidden');
            tabMap.classList.add('tab-active'); tabList.classList.remove('tab-active');
            setTimeout(() => { map.invalidateSize(); checkPositionVisibility(); }, 100);
        };
        tabList.onclick = () => {
            viewList.classList.remove('hidden'); viewMap.classList.add('hidden');
            tabList.classList.add('tab-active'); tabMap.classList.remove('tab-active');
        };

        window.onload = initMap;
    </script>
</body>
</html>
