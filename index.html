<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 數位影像工作坊 | Ultra Studio V6.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-dark: #0f172a;
            --panel-dark: #1e293b;
            --accent-blue: #38bdf8;
            --border-slate: #334155;
        }

        body {
            background-color: var(--bg-dark);
            color: #f1f5f9;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }

        input[type=range] {
            height: 6px;
            -webkit-appearance: none;
            background: #334155;
            border-radius: 10px;
            accent-color: var(--accent-blue);
            outline: none;
            position: relative;
            z-index: 2;
        }

        .range-container {
            position: relative;
            padding: 8px 0;
        }
        
        .optimum-track {
            position: absolute;
            top: 11px;
            height: 6px;
            border-radius: 10px;
            background: rgba(56, 189, 248, 0.3);
            pointer-events: none;
            z-index: 1;
            display: none;
        }

        .canvas-container {
            background-image: 
                linear-gradient(45deg, #1e293b 25%, transparent 25%), 
                linear-gradient(-45deg, #1e293b 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, #1e293b 75%), 
                linear-gradient(-45deg, transparent 75%, #1e293b 75%);
            background-size: 20px 20px;
        }

        #mainCanvas {
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            cursor: grab;
            transition: transform 0.1s ease-out;
            transform-origin: center center;
        }

        #mainCanvas.picking-mode {
            cursor: crosshair !important;
        }

        .assistant-bubble {
            position: relative;
            background: #38bdf8;
            color: #0f172a;
            border-radius: 1rem;
            padding: 0.75rem 1rem;
            font-size: 0.875rem;
            font-weight: 800;
            box-shadow: 0 10px 25px rgba(56, 189, 248, 0.4);
            max-width: 260px;
            z-index: 50;
        }

        .filter-card {
            background: #334155;
            transition: all 0.2s;
            border: 2px solid transparent;
        }
        .filter-card.active {
            border-color: var(--accent-blue);
            background: rgba(56, 189, 248, 0.1);
        }

        .style-btn-active {
            background-color: var(--accent-blue) !important;
            color: #0f172a !important;
            font-weight: bold;
        }

        .toggle-btn-active {
            background-color: #38bdf8 !important;
            color: #0f172a !important;
            border-color: white !important;
        }

        details summary::-webkit-details-marker { display:none; }
    </style>
</head>
<body class="flex">

    <!-- 左側工具面板 -->
    <aside class="w-80 bg-[#1e293b] border-r border-[#334155] flex flex-col h-full z-20 shadow-2xl overflow-hidden">
        <div class="p-5 border-b border-[#334155] flex justify-between items-center bg-[#0f172a]/30">
            <h1 class="text-lg font-black tracking-tighter text-[#38bdf8]">ULTRA STUDIO <span class="text-white text-xs">V6.2</span></h1>
            <div id="compare-indicator" class="hidden text-[10px] bg-red-500 text-white px-2 py-0.5 rounded font-bold animate-pulse">ORIGINAL VIEW</div>
        </div>

        <div class="flex-1 overflow-y-auto p-5 space-y-6">
            <!-- 模式切換 -->
            <section class="space-y-3">
                <h2 class="text-[10px] font-bold text-slate-500 uppercase tracking-widest flex justify-between">
                    <span>風格引導</span>
                    <span id="current-style-label" class="text-blue-400 font-mono">NORMAL</span>
                </h2>
                <div class="grid grid-cols-3 gap-2 text-[10px]">
                    <button id="style-normal" class="style-btn bg-slate-700 py-2 rounded style-btn-active">大眾</button>
                    <button id="style-weird" class="style-btn bg-slate-700 py-2 rounded">獵奇</button>
                    <button id="style-grandma" class="style-btn bg-slate-700 py-2 rounded">阿嬤</button>
                </div>
            </section>

            <!-- 核心調整 -->
            <section class="space-y-4">
                <h2 class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">核心調整</h2>
                <div class="space-y-3">
                    <div class="space-y-1">
                        <div class="flex justify-between text-[11px]"><label>亮度 Brightness</label><span id="label-brightness">100%</span></div>
                        <div class="range-container">
                            <div id="optimum-brightness" class="optimum-track"></div>
                            <input type="range" id="input-brightness" min="0" max="200" value="100" class="w-full">
                        </div>
                    </div>
                    <div class="space-y-1">
                        <div class="flex justify-between text-[11px]"><label>對比度 Contrast</label><span id="label-contrast">100%</span></div>
                        <input type="range" id="input-contrast" min="0" max="200" value="100" class="w-full">
                    </div>
                    <div class="space-y-1">
                        <div class="flex justify-between text-[11px]"><label>飽和度 Saturation</label><span id="label-saturation">100%</span></div>
                        <div class="range-container">
                            <div id="optimum-saturation" class="optimum-track"></div>
                            <input type="range" id="input-saturation" min="0" max="300" value="100" class="w-full">
                        </div>
                    </div>
                    <div class="space-y-1">
                        <div class="flex justify-between text-[11px]"><label>色相偏移 Hue</label><span id="label-hue">0°</span></div>
                        <div class="range-container">
                            <div id="optimum-hue" class="optimum-track"></div>
                            <input type="range" id="input-hue" min="-180" max="180" value="0" class="w-full">
                        </div>
                    </div>
                </div>
            </section>

            <!-- 去背功能工具 -->
            <section class="p-4 bg-blue-500/10 rounded-xl space-y-3 border border-blue-500/20">
                <h2 class="text-[10px] font-bold text-blue-400 uppercase tracking-widest">去背工具箱</h2>
                <button id="btn-toggle-picker" class="w-full py-2 text-xs font-bold bg-slate-800 border border-slate-700 rounded flex items-center justify-center gap-2 hover:border-blue-400 transition-all">
                    <svg viewBox="0 0 24 24" class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4.5l1-1L15 6l-1 1M8 16l4-4 3 3-4 4-3-3zM3 21l2.5-2.5"/></svg>
                    <span>啟動顏色去背選取</span>
                </button>
                <div class="flex items-center gap-3">
                    <div id="transparent-color-preview" class="w-10 h-10 rounded border border-white/20 bg-transparent relative overflow-hidden flex-shrink-0">
                        <div class="absolute inset-0 flex items-center justify-center text-[8px] text-white/40 leading-tight text-center">未選取</div>
                    </div>
                    <p class="text-[10px] text-slate-400 leading-relaxed">
                        啟動後點擊圖片選色。去背模式下長按對照功能會關閉。
                    </p>
                </div>
                <button id="btn-clear-transparency" class="w-full py-1 text-[10px] text-slate-500 hover:text-white transition-all">恢復原始色彩</button>
            </section>

            <!-- 進階細節 -->
            <details class="group">
                <summary class="flex items-center justify-between cursor-pointer text-[10px] font-bold text-slate-500 uppercase tracking-widest py-2 hover:text-white">
                    <span>進階細節</span>
                    <span class="group-open:rotate-180 transition-transform">▼</span>
                </summary>
                <div class="space-y-4 pt-3 border-t border-slate-700/50 mt-2">
                    <div class="space-y-1">
                        <div class="flex justify-between text-[11px]"><label>曝光度 Exposure</label><span id="label-exposure">0</span></div>
                        <input type="range" id="input-exposure" min="-100" max="100" value="0" class="w-full">
                    </div>
                    <div class="space-y-1">
                        <div class="flex justify-between text-[11px]"><label>暖色調 Warmth</label><span id="label-warmth">0</span></div>
                        <input type="range" id="input-warmth" min="-100" max="100" value="0" class="w-full">
                    </div>
                    <div class="space-y-1">
                        <div class="flex justify-between text-[11px]"><label>高光亮部 Highlights</label><span id="label-highlights">0</span></div>
                        <input type="range" id="input-highlights" min="-100" max="100" value="0" class="w-full">
                    </div>
                    <div class="space-y-1">
                        <div class="flex justify-between text-[11px]"><label>陰影細節 Shadows</label><span id="label-shadows">0</span></div>
                        <input type="range" id="input-shadows" min="-100" max="100" value="0" class="w-full">
                    </div>
                </div>
            </details>

            <!-- 藝術效果 -->
            <details class="group">
                <summary class="flex items-center justify-between cursor-pointer text-[10px] font-bold text-slate-500 uppercase tracking-widest py-2 hover:text-white">
                    <span>藝術效果</span>
                    <span class="group-open:rotate-180 transition-transform">▼</span>
                </summary>
                <div class="space-y-4 pt-3 border-t border-slate-700/50 mt-2">
                    <div class="space-y-1">
                        <div class="flex justify-between text-[11px]"><label>顆粒感 Grain</label><span id="label-grain">0</span></div>
                        <input type="range" id="input-grain" min="0" max="100" value="0" class="w-full">
                    </div>
                    <div class="space-y-1">
                        <div class="flex justify-between text-[11px]"><label>模糊度 Blur</label><span id="label-blur">0px</span></div>
                        <input type="range" id="input-blur" min="0" max="20" value="0" class="w-full">
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <div id="card-grayscale" class="filter-card p-2 rounded text-[10px] text-center cursor-pointer">灰階</div>
                        <div id="card-invert" class="filter-card p-2 rounded text-[10px] text-center cursor-pointer">反相</div>
                        <div id="card-sepia" class="filter-card p-2 rounded text-[10px] text-center cursor-pointer">懷舊</div>
                        <div id="card-vignette" class="filter-card p-2 rounded text-[10px] text-center cursor-pointer">暗角</div>
                    </div>
                </div>
            </details>

            <!-- 助理設定 -->
            <section class="p-4 bg-black/40 rounded-xl space-y-2 border border-white/5">
                <h2 class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">助理人格模式</h2>
                <select id="assistant-mode" class="w-full bg-slate-900 border border-slate-700 text-xs p-2 rounded text-blue-400 font-bold">
                    <option value="normal">效率模式 (Normal)</option>
                    <option value="kind">全肯定模式 (Kind)</option>
                    <option value="mean">超嗆模式 (Mean)</option>
                </select>
            </section>
        </div>

        <div class="p-5 border-t border-[#334155] bg-[#0f172a]/50 space-y-2">
            <button id="btnDownload" class="w-full bg-white text-black font-black py-3 rounded text-xs hover:bg-[#38bdf8] transition-all">EXPORT IMAGE</button>
            <button id="btnReset" class="w-full text-slate-500 text-[10px] hover:text-white uppercase tracking-tighter">Reset Studio</button>
        </div>
    </aside>

    <!-- 中間畫布 -->
    <main id="drop-zone" class="flex-1 flex flex-col relative canvas-container overflow-hidden">
        <div class="absolute top-6 left-8 z-10">
            <div id="imageSpecs" class="text-[10px] text-blue-300 bg-blue-950/40 backdrop-blur px-3 py-1 rounded border border-blue-500/30 font-mono">READY</div>
        </div>
        
        <div id="canvas-viewport" class="flex-1 flex items-center justify-center p-12 overflow-hidden">
            <canvas id="mainCanvas" class="hidden"></canvas>
            <div id="emptyState" class="flex flex-col items-center gap-6">
                <div class="w-32 h-32 rounded-full border-2 border-dashed border-slate-700 flex items-center justify-center text-slate-700 font-bold">IMAGE</div>
                <button onclick="document.getElementById('fileInput').click()" class="px-6 py-2 bg-slate-800 text-xs rounded-full border border-slate-700 hover:border-blue-500">上傳影像檔案</button>
                <input type="file" id="fileInput" class="hidden" accept="image/*">
            </div>
        </div>

        <!-- 助理區 -->
        <div class="absolute bottom-10 right-10 z-30 flex flex-col items-end gap-3 pointer-events-none">
            <div id="assistant-bubble" class="assistant-bubble">歡迎使用 Ultra Studio 6.2</div>
            <div id="assistant-avatar" class="w-16 h-16 bg-gradient-to-br from-blue-400 to-indigo-600 rounded-full flex items-center justify-center shadow-2xl border-4 border-white/10 transition-transform">
                <svg viewBox="0 0 24 24" class="w-10 h-10 text-white" fill="currentColor"><circle cx="12" cy="10" r="4"/><path d="M12 14c-4 0-7 2-7 6h14c0-4-3-6-7-6z"/></svg>
            </div>
        </div>
    </main>

    <!-- 右側紀錄 -->
    <aside class="w-64 bg-[#0f172a] border-l border-[#334155] flex flex-col h-full z-20">
        <div class="p-5 border-b border-[#334155] bg-white/5 font-bold text-[10px] text-slate-400 tracking-widest">LOGS</div>
        <div id="history-list" class="flex-1 overflow-y-auto p-4 space-y-2 font-mono text-[10px]"></div>
    </aside>

    <script>
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const bubble = document.getElementById('assistant-bubble');
        const historyList = document.getElementById('history-list');
        
        let originalImage = null;
        let isComparing = false;
        let isPickerActive = false; // 是否正在選色去背模式
        let scale = 1;
        let history = [];
        let currentStyle = 'normal';
        let transparentColor = null;

        let settings = {
            brightness: 1, saturation: 1, contrast: 1, hue: 0,
            exposure: 0, warmth: 0, highlights: 0, shadows: 0,
            grain: 0, blur: 0,
            grayscale: false, invert: false, sepia: false, vignette: false
        };

        const OPTIMUMS = {
            normal: { brightness: [0.8, 1.2], saturation: [0.8, 1.2], hue: [-15, 15] },
            weird: { brightness: [1.1, 1.8], saturation: [1.6, 2.8], hue: [120, 180] },
            grandma: { brightness: [1.0, 1.4], saturation: [1.8, 3.2], hue: [5, 50] }
        };

        const dialogues = {
            normal: {
                intro: "系統 V6.2 已就緒，請開始編輯。",
                start: "影像已載入。",
                compare: "顯示原圖對照。",
                brightness: { tooHigh: "光線過強，建議調低。", tooLow: "畫面太暗了。", perfect: "亮度非常理想。" },
                saturation: { tooHigh: "飽和度過高，顏色溢出。", tooLow: "色彩稍微平淡。", perfect: "色彩飽和度優良。" },
                hue: { far: "色相偏移過大。", perfect: "色準表現良好。" }
            },
            kind: {
                intro: "歡迎回來！準備好創造美圖了嗎？",
                start: "這張圖非常有潛力！",
                compare: "看看您驚人的進度！",
                brightness: { tooHigh: "光芒四射的效果！", tooLow: "很有深度的黑色調。", perfect: "這光影拿捏得真好！" },
                saturation: { tooHigh: "色彩繽紛充滿活力！", tooLow: "優雅的低飽和風格。", perfect: "這色彩簡直太美了！" },
                hue: { far: "非常有創意的色調！", perfect: "色彩完美和諧。" }
            },
            mean: {
                intro: "又要來亂改了嗎？",
                start: "這原圖就夠慘了，加油吧。",
                compare: "看原圖是為了提醒你調得多糟。",
                brightness: { tooHigh: "你在修太陽嗎？眼睛要瞎了。", tooLow: "關燈睡覺算了，什麼都看不到。", perfect: "算你調得還可以。" },
                saturation: { tooHigh: "這顏色噁心到我了。", tooLow: "這是在修遺照嗎？沒血沒色。", perfect: "免強能看。" },
                hue: { far: "你是色盲還是故意挑這種色？", perfect: "色相沒歪，真難得。" }
            }
        };

        window.onload = () => {
            setupFileHandling();
            setupControls();
            setupFilters();
            setupZoom();
            setupInteractions(); // 整合長按與去背點擊
            updateOptimumTracks();
        };

        function setupFileHandling() {
            const dropZone = document.getElementById('drop-zone');
            dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('bg-blue-500/10'); };
            dropZone.ondragleave = () => dropZone.classList.remove('bg-blue-500/10');
            dropZone.ondrop = (e) => {
                e.preventDefault();
                dropZone.classList.remove('bg-blue-500/10');
                handleFile(e.dataTransfer.files[0]);
            };
            document.getElementById('fileInput').onchange = (e) => handleFile(e.target.files[0]);
        }

        function handleFile(file) {
            if (!file?.type.startsWith('image/')) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    originalImage = img;
                    document.getElementById('emptyState').classList.add('hidden');
                    canvas.classList.remove('hidden');
                    reset();
                    pushHistory("IMG_LOAD");
                    speak('start');
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function setupControls() {
            const mapping = [
                { id: 'brightness', factor: 100 },
                { id: 'contrast', factor: 100 },
                { id: 'saturation', factor: 100 },
                { id: 'hue', factor: 1 },
                { id: 'exposure', factor: 1 },
                { id: 'warmth', factor: 1 },
                { id: 'highlights', factor: 1 },
                { id: 'shadows', factor: 1 },
                { id: 'grain', factor: 1 },
                { id: 'blur', factor: 1 }
            ];

            mapping.forEach(item => {
                const el = document.getElementById(`input-${item.id}`);
                const label = document.getElementById(`label-${item.id}`);
                
                el.oninput = (e) => {
                    const v = parseFloat(e.target.value);
                    settings[item.id] = (item.id === 'hue' || item.id === 'blur') ? v : v / item.factor;
                    label.innerText = (item.id === 'blur') ? v + 'px' : (item.id === 'hue' ? v + '°' : e.target.value + (item.factor === 100 ? '%' : ''));
                    render();
                };

                el.onchange = () => {
                    pushHistory(`SET_${item.id.toUpperCase()}`);
                    handleValueSpeak(item.id, settings[item.id]);
                };
            });

            ['normal', 'weird', 'grandma'].forEach(mode => {
                document.getElementById(`style-${mode}`).onclick = () => {
                    currentStyle = mode;
                    applyPreset(mode);
                };
            });

            document.getElementById('btnReset').onclick = reset;
            document.getElementById('btnDownload').onclick = download;
            document.getElementById('assistant-mode').onchange = () => speak('intro');
        }

        // 核心邏輯：區分長按與去背點擊
        function setupInteractions() {
            const pickerBtn = document.getElementById('btn-toggle-picker');
            const clearBtn = document.getElementById('btn-clear-transparency');
            const preview = document.getElementById('transparent-color-preview');

            // 開關去背模式
            pickerBtn.onclick = () => {
                isPickerActive = !isPickerActive;
                pickerBtn.classList.toggle('toggle-btn-active', isPickerActive);
                canvas.classList.toggle('picking-mode', isPickerActive);
                
                if (isPickerActive) {
                    pickerBtn.querySelector('span').innerText = "請點擊圖片像素";
                    bubble.innerText = "去背模式啟動：請點擊畫面上想移除的顏色。";
                } else {
                    pickerBtn.querySelector('span').innerText = "啟動顏色去背選取";
                }
            };

            // 清除去背
            clearBtn.onclick = () => {
                transparentColor = null;
                preview.style.backgroundColor = 'transparent';
                preview.innerHTML = '<div class="absolute inset-0 flex items-center justify-center text-[8px] text-white/40 leading-tight text-center">未選取</div>';
                pushHistory("COLOR_KEY_RESET");
                render();
            };

            // 處理滑鼠事件
            canvas.onmousedown = (e) => {
                if (!originalImage) return;

                if (isPickerActive) {
                    // 去背選色模式
                    const rect = canvas.getBoundingClientRect();
                    const x = (e.clientX - rect.left) * (canvas.width / rect.width);
                    const y = (e.clientY - rect.top) * (canvas.height / rect.height);
                    
                    const pixel = ctx.getImageData(x, y, 1, 1).data;
                    transparentColor = [pixel[0], pixel[1], pixel[2]];
                    
                    preview.style.backgroundColor = `rgb(${pixel[0]}, ${pixel[1]}, ${pixel[2]})`;
                    preview.innerHTML = '';
                    
                    pushHistory("COLOR_KEY_SET");
                    
                    // 選完後關閉模式
                    isPickerActive = false;
                    pickerBtn.classList.remove('toggle-btn-active');
                    canvas.classList.remove('picking-mode');
                    pickerBtn.querySelector('span').innerText = "啟動顏色去背選取";
                    render();
                } else {
                    // 正常模式：長按對照
                    isComparing = true;
                    document.getElementById('compare-indicator').classList.remove('hidden');
                    render();
                }
            };

            window.addEventListener('mouseup', () => {
                if (isComparing) {
                    isComparing = false;
                    document.getElementById('compare-indicator').classList.add('hidden');
                    render();
                }
            });
        }

        function applyPreset(mode) {
            document.querySelectorAll('.style-btn').forEach(b => b.classList.remove('style-btn-active'));
            document.getElementById(`style-${mode}`).classList.add('style-btn-active');
            document.getElementById('current-style-label').innerText = mode.toUpperCase();

            resetSettings();
            if (mode === 'weird') {
                settings.saturation = 2.2; settings.hue = 150; settings.invert = true; settings.contrast = 1.5;
            } else if (mode === 'grandma') {
                settings.saturation = 2.8; settings.warmth = 40; settings.brightness = 1.2; settings.contrast = 1.3;
            }
            
            updateOptimumTracks();
            syncUI();
            pushHistory(`MODE_${mode.toUpperCase()}`);
            speak('intro');
            render();
        }

        function handleValueSpeak(id, val) {
            const persona = document.getElementById('assistant-mode').value;
            if (!dialogues[persona] || !dialogues[persona][id] || !OPTIMUMS[currentStyle][id]) return;

            const pool = dialogues[persona][id];
            const opt = OPTIMUMS[currentStyle][id];
            
            let key = 'perfect';
            // 校正亮度判斷：數值大於 1 代表調亮
            if (val < opt[0]) key = 'tooLow';
            else if (val > opt[1]) key = 'tooHigh';

            const msg = pool[key] || "調整已完成。";
            bubble.innerText = msg;
            animateAvatar();
        }

        function speak(category) {
            const persona = document.getElementById('assistant-mode').value;
            const pool = dialogues[persona][category] || dialogues['normal'][category] || "處理中...";
            bubble.innerText = Array.isArray(pool) ? pool[0] : pool;
            animateAvatar();
        }

        function animateAvatar() {
            const avatar = document.getElementById('assistant-avatar');
            avatar.classList.add('scale-110');
            setTimeout(() => avatar.classList.remove('scale-110'), 200);
        }

        function render() {
            if (!originalImage) return;
            canvas.width = originalImage.width;
            canvas.height = originalImage.height;

            if (isComparing) {
                ctx.filter = 'none';
                ctx.drawImage(originalImage, 0, 0);
                return;
            }

            // 基礎濾鏡效果
            ctx.filter = `
                brightness(${settings.brightness}) 
                contrast(${settings.contrast}) 
                saturate(${settings.saturation}) 
                hue-rotate(${settings.hue}deg)
                blur(${settings.blur}px)
            `;
            ctx.drawImage(originalImage, 0, 0);

            // 像素級處裡 (去背與曝光/暖度)
            const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imgData.data;
            const exp = settings.exposure * 2;
            const wrm = settings.warmth;
            const hi = settings.highlights;
            const sh = settings.shadows;

            for (let i = 0; i < data.length; i += 4) {
                let r = data[i], g = data[i+1], b = data[i+2];
                
                // 去背處裡
                if (transparentColor) {
                    const diff = Math.abs(r - transparentColor[0]) + Math.abs(g - transparentColor[1]) + Math.abs(b - transparentColor[2]);
                    if (diff < 40) { // 去背容許度
                        data[i+3] = 0;
                        continue;
                    }
                }

                // 顏色與曝光
                r += exp + wrm; g += exp; b += exp - wrm;

                if (settings.grayscale) { const gray = 0.3*r + 0.59*g + 0.11*b; r = g = b = gray; }
                if (settings.invert) { r = 255-r; g = 255-g; b = 255-b; }
                if (settings.sepia) {
                    const tr = 0.39*r + 0.76*g + 0.18*b;
                    const tg = 0.35*r + 0.68*g + 0.16*b;
                    const tb = 0.27*r + 0.53*g + 0.13*b;
                    r = tr; g = tg; b = tb;
                }

                const avg = (r+g+b)/3;
                if(avg > 180) { r += hi; g += hi; b += hi; }
                else if(avg < 75) { r += sh; g += sh; b += sh; }

                if(settings.grain > 0) {
                    const noise = (Math.random()-0.5) * settings.grain;
                    r += noise; g += noise; b += noise;
                }

                data[i] = Math.min(255, Math.max(0, r));
                data[i+1] = Math.min(255, Math.max(0, g));
                data[i+2] = Math.min(255, Math.max(0, b));
            }
            ctx.putImageData(imgData, 0, 0);

            if (settings.vignette) {
                const grad = ctx.createRadialGradient(canvas.width/2, canvas.height/2, canvas.width*0.3, canvas.width/2, canvas.height/2, canvas.width*0.9);
                grad.addColorStop(0, "transparent"); grad.addColorStop(1, "rgba(0,0,0,0.7)");
                ctx.fillStyle = grad; ctx.fillRect(0,0,canvas.width, canvas.height);
            }

            document.getElementById('imageSpecs').innerText = `${canvas.width}x${canvas.height} | ${(scale*100).toFixed(0)}%`;
        }

        function updateOptimumTracks() {
            const opt = OPTIMUMS[currentStyle];
            const tracks = { 
                brightness: { el: 'optimum-brightness', max: 200 }, 
                saturation: { el: 'optimum-saturation', max: 300 },
                hue: { el: 'optimum-hue', min: -180, max: 180 }
            };
            Object.keys(tracks).forEach(key => {
                const track = document.getElementById(tracks[key].el);
                if (!track) return;
                const range = opt[key];
                if(key === 'hue') {
                    track.style.left = `${((range[0]+180)/360)*100}%`;
                    track.style.width = `${((range[1]-range[0])/360)*100}%`;
                } else {
                    track.style.left = `${(range[0]*100/tracks[key].max)*100}%`;
                    track.style.width = `${((range[1]-range[0])*100/tracks[key].max)*100}%`;
                }
                track.style.display = 'block';
            });
        }

        function setupFilters() {
            ['grayscale', 'invert', 'sepia', 'vignette'].forEach(id => {
                document.getElementById(`card-${id}`).onclick = () => {
                    settings[id] = !settings[id];
                    document.getElementById(`card-${id}`).classList.toggle('active', settings[id]);
                    pushHistory(`TOGGLE_${id.toUpperCase()}`);
                    render();
                };
            });
        }

        function setupZoom() {
            const viewport = document.getElementById('canvas-viewport');
            viewport.onwheel = (e) => { 
                if(!originalImage) return; 
                e.preventDefault(); 
                scale += e.deltaY * -0.001; 
                scale = Math.min(Math.max(0.1, scale), 5); 
                canvas.style.transform = `scale(${scale})`; 
                render();
            };
        }

        function resetSettings() {
            settings = { brightness: 1, saturation: 1, contrast: 1, hue: 0, exposure: 0, warmth: 0, highlights: 0, shadows: 0, grain: 0, blur: 0, grayscale: false, invert: false, sepia: false, vignette: false };
            transparentColor = null;
            isPickerActive = false;
        }

        function syncUI() {
            document.getElementById('input-brightness').value = settings.brightness*100;
            document.getElementById('label-brightness').innerText = (settings.brightness*100).toFixed(0)+'%';
            document.getElementById('input-contrast').value = settings.contrast*100;
            document.getElementById('label-contrast').innerText = (settings.contrast*100).toFixed(0)+'%';
            document.getElementById('input-saturation').value = settings.saturation*100;
            document.getElementById('label-saturation').innerText = (settings.saturation*100).toFixed(0)+'%';
            document.getElementById('input-hue').value = settings.hue;
            document.getElementById('label-hue').innerText = settings.hue+'°';
            document.getElementById('input-exposure').value = settings.exposure;
            document.getElementById('input-warmth').value = settings.warmth;
            document.getElementById('input-highlights').value = settings.highlights;
            document.getElementById('input-shadows').value = settings.shadows;
            document.getElementById('input-grain').value = settings.grain;
            document.getElementById('input-blur').value = settings.blur;
            ['grayscale', 'invert', 'sepia', 'vignette'].forEach(id => {
                document.getElementById(`card-${id}`).classList.toggle('active', settings[id]);
            });
            const pickerBtn = document.getElementById('btn-toggle-picker');
            pickerBtn.classList.remove('toggle-btn-active');
            pickerBtn.querySelector('span').innerText = "啟動顏色去背選取";
            canvas.classList.remove('picking-mode');
        }

        function pushHistory(type) {
            history.unshift({ type, time: new Date().toLocaleTimeString() });
            if(history.length > 25) history.pop();
            historyList.innerHTML = history.map(h => `<div class="p-1 border-b border-white/5 flex justify-between"><span class="text-blue-500">${h.type}</span><span class="text-slate-500">${h.time}</span></div>`).join('');
        }

        function reset() {
            resetSettings();
            currentStyle = 'normal';
            scale = 1;
            canvas.style.transform = `scale(1)`;
            syncUI();
            updateOptimumTracks();
            render();
            speak('intro');
        }

        function download() {
            if(!originalImage) return;
            const a = document.createElement('a');
            a.download = 'studio-export.png';
            a.href = canvas.toDataURL();
            a.click();
        }
    </script>
</body>
</html>
