<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>作品導覽系統</title>
    <!-- 引入 Tailwind CSS 提供現代化且乾淨的 UI 樣式 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght=300;400;500;700&display=swap');
        body {
            font-family: 'Noto Sans TC', sans-serif;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col justify-between text-slate-800">

    <!-- 主體內容區 -->
    <main class="flex-grow flex items-center justify-center px-4 py-12">
        <div class="max-w-4xl w-full">
            <!-- 標題區 -->
            <div class="text-center mb-12">
                <h1 class="text-3xl md:text-4xl font-bold text-slate-900 tracking-wide mb-3">
                    個人作品集導覽
                </h1>
                <p class="text-slate-500 text-sm md:text-base">
                    請點選下方按鈕，連結至對應的系統與遊戲
                </p>
                <div class="w-16 h-1 bg-blue-500 mx-auto mt-4 rounded-full"></div>
            </div>

            <!-- 三個主要按鈕卡片 -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                
                <!-- 卡片 1: 影像工作坊 -->
                <a href="https://ccy22222.github.io/12345/index1.html" 
                   target="_blank" 
                   class="group bg-white p-6 rounded-2xl shadow-sm border border-slate-100 hover:border-blue-500 hover:shadow-md transition-all duration-300 flex flex-col justify-between text-left">
                    <div>
                        <!-- 圖示 -->
                        <div class="w-12 h-12 bg-blue-50 rounded-xl flex items-center justify-center text-blue-600 mb-5 group-hover:bg-blue-500 group-hover:text-white transition-all duration-300">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                            </svg>
                        </div>
                        <h2 class="text-xl font-bold text-slate-800 mb-2">影像工作坊</h2>
                        <p class="text-slate-500 text-sm leading-relaxed mb-6">
                            線上影像處理與編輯工具，提供多種實用的圖像調整功能。
                        </p>
                    </div>
                    <span class="inline-flex items-center text-sm font-semibold text-blue-600 group-hover:translate-x-1 transition-transform">
                        立即前往
                        <svg class="w-4 h-4 ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                        </svg>
                    </span>
                </a>

                <!-- 卡片 2: Youbike查詢系統 -->
                <a href="https://ccy22222.github.io/12345/index3.html" 
                   target="_blank" 
                   class="group bg-white p-6 rounded-2xl shadow-sm border border-slate-100 hover:border-emerald-500 hover:shadow-md transition-all duration-300 flex flex-col justify-between text-left">
                    <div>
                        <!-- 圖示 -->
                        <div class="w-12 h-12 bg-emerald-50 rounded-xl flex items-center justify-center text-emerald-600 mb-5 group-hover:bg-emerald-500 group-hover:text-white transition-all duration-300">
                            <!-- 自行車圖示 -->
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
                            </svg>
                        </div>
                        <h2 class="text-xl font-bold text-slate-800 mb-2">Youbike查詢系統</h2>
                        <p class="text-slate-500 text-sm leading-relaxed mb-6">
                            即時查詢周邊 Youbike 站點位置、可借車輛與可還空位數量。
                        </p>
                    </div>
                    <span class="inline-flex items-center text-sm font-semibold text-emerald-600 group-hover:translate-x-1 transition-transform">
                        立即查詢
                        <svg class="w-4 h-4 ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                        </svg>
                    </span>
                </a>

                <!-- 卡片 3: 五子棋遊戲 -->
                <a href="https://ccy22222.github.io/12345/index2.html" 
                   target="_blank" 
                   class="group bg-white p-6 rounded-2xl shadow-sm border border-slate-100 hover:border-amber-500 hover:shadow-md transition-all duration-300 flex flex-col justify-between text-left">
                    <div>
                        <!-- 圖示 -->
                        <div class="w-12 h-12 bg-amber-50 rounded-xl flex items-center justify-center text-amber-600 mb-5 group-hover:bg-amber-500 group-hover:text-white transition-all duration-300">
                            <!-- 棋盤/遊戲圖示 -->
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4" />
                            </svg>
                        </div>
                        <h2 class="text-xl font-bold text-slate-800 mb-2">五子棋遊戲</h2>
                        <p class="text-slate-500 text-sm leading-relaxed mb-6">
                            經典的雙人對弈五子棋遊戲，考驗您的排兵布陣與策略思考。
                        </p>
                    </div>
                    <span class="inline-flex items-center text-sm font-semibold text-amber-600 group-hover:translate-x-1 transition-transform">
                        開始遊戲
                        <svg class="w-4 h-4 ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                        </svg>
                    </span>
                </a>

            </div>
        </div>
    </main>

    <!-- 頁尾資訊 -->
    <footer class="py-6 text-center text-xs text-slate-400 border-t border-slate-100 bg-white">
        <p>© 2026 個人作品集. 保留所有權利。</p>
    </footer>

</body>
</html>
